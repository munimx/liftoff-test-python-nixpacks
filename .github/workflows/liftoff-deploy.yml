name: Liftoff Deploy

on:
  push:
    branches: ['main']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push image
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_URI: registry.digitalocean.com/liftoff-883df567b4/nixpacks-python-test/production:${{ github.sha }}
          CONFIGURED_BUILD_STRATEGY: auto
          CONFIGURED_DOCKERFILE_PATH: Dockerfile
          CONFIGURED_DOCKER_CONTEXT: .
        run: |
          set -euo pipefail

          BUILD_STRATEGY=""
          BUILD_PLAN=""

          if [ -f "./Dockerfile" ]; then
            BUILD_STRATEGY="dockerfile"
            docker build -f Dockerfile -t "$IMAGE_URI" .
          elif [ "$CONFIGURED_BUILD_STRATEGY" = "dockerfile" ]; then
            BUILD_STRATEGY="dockerfile"
            docker build -f "$CONFIGURED_DOCKERFILE_PATH" -t "$IMAGE_URI" "$CONFIGURED_DOCKER_CONTEXT"
          else
            BUILD_STRATEGY="nixpacks"
            curl -fsSL https://nixpacks.com/install.sh | bash
            export PATH="$HOME/.local/bin:$PATH"

            BUILD_PLAN="$(nixpacks plan "$CONFIGURED_DOCKER_CONTEXT" --format json | tr -d '\n')"
            nixpacks build "$CONFIGURED_DOCKER_CONTEXT" --name "$IMAGE_URI"
          fi

          docker push "$IMAGE_URI"

          {
            echo "image_uri=$IMAGE_URI"
            echo "build_strategy=$BUILD_STRATEGY"
            echo "build_plan<<LIFTOFF_BUILD_PLAN"
            echo "$BUILD_PLAN"
            echo "LIFTOFF_BUILD_PLAN"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Liftoff
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
          BUILD_STRATEGY: ${{ steps.build.outputs.build_strategy }}
          BUILD_PLAN: ${{ steps.build.outputs.build_plan }}
        run: |
          BUILD_PLAN_JSON=""
          if [ -n "$BUILD_PLAN" ]; then
            BUILD_PLAN_JSON="$(printf '%s' "$BUILD_PLAN" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')"
          fi

          if [ -n "$BUILD_PLAN_JSON" ]; then
            PAYLOAD="{\"environmentId\":\"cmplpk969004ga820nj6wrycp\",\"imageUri\":\"$IMAGE_URI\",\"commitSha\":\"$GITHUB_SHA\",\"status\":\"$JOB_STATUS\",\"runUrl\":\"$RUN_URL\",\"buildStrategy\":\"$BUILD_STRATEGY\",\"buildPlan\":$BUILD_PLAN_JSON}"
          else
            PAYLOAD="{\"environmentId\":\"cmplpk969004ga820nj6wrycp\",\"imageUri\":\"$IMAGE_URI\",\"commitSha\":\"$GITHUB_SHA\",\"status\":\"$JOB_STATUS\",\"runUrl\":\"$RUN_URL\",\"buildStrategy\":\"$BUILD_STRATEGY\"}"
          fi

          curl -X POST https://aniya-preservable-harriett.ngrok-free.dev/api/v1/webhooks/deploy-complete \
            -H "X-Liftoff-Secret: ${{ secrets.LIFTOFF_DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
